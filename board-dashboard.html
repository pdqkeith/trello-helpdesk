<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="https://trellocdn.com">
    <script src="https://trellocdn.com"></script>
    <style>
      .ticket-item { padding: 12px; border-bottom: 1px solid #ddd; cursor: pointer; }
      .ticket-item:hover { background-color: #f4f5f7; }
    </style>
  </head>
  <body style="padding: 20px;">
    <h2>Active Board Tickets</h2>
    <div id="ticket-list">Loading tickets...</div>

    <script>
      var t = TrelloPowerUp.iframe();

      t.cards('all').then(function(cards) {
        var listDiv = document.getElementById('ticket-list');
        listDiv.innerHTML = '';
        var openCount = 0;

        cards.forEach(function(card) {
          if (card.pluginData && card.pluginData.shared && card.pluginData.shared.ticket) {
            var ticket = card.pluginData.shared.ticket;
            if (ticket.status === 'open') {
              openCount++;
              var item = document.createElement('div');
              item.className = 'ticket-item';
              item.innerHTML = `<strong>[Card: ${card.name}]</strong> ${ticket.title}`;
              
              item.onclick = function() {
                t.showCard(card.id).then(function() { t.closeModal(); });
              };
              listDiv.appendChild(item);
            }
          }
        });

        if (openCount === 0) {
          listDiv.innerHTML = '<p>No open tickets found on this board!</p>';
        }
      });
    </script>
  </body>
</html>
